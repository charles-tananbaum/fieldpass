<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <defs>
    <linearGradient id="thermal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8723a"/>
      <stop offset="35%" stop-color="#d4553a"/>
      <stop offset="65%" stop-color="#8a3ae8"/>
      <stop offset="100%" stop-color="#3a8ee8"/>
    </linearGradient>
  </defs>

  <!-- Wordmark: full thermal gradient — readable on light AND dark backgrounds -->
  <text x="0" y="92"
        font-family="'Instrument Serif', 'Times New Roman', Georgia, serif"
        font-size="84"
        font-weight="400"
        fill="url(#thermal)">FieldPass</text>

  <!-- Thermal bar -->
  <rect x="2" y="108" width="280" height="3" rx="1.5" fill="url(#thermal)"/>

  <!-- Tagline: brand orange — high contrast on both white and dark bgs -->
  <text x="2" y="138"
        font-family="'DM Mono', 'Courier New', monospace"
        font-size="14"
        letter-spacing="2"
        fill="#e8723a">SOFTWARE FOR HVAC OPERATORS</text>
</svg>
